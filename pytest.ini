[pytest]
# Pytest configuration for hybrid_citation_scraper tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Directory to start test discovery
testpaths = hybrid_citation_scraper/tests

# Show extra test summary info
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --cov=hybrid_citation_scraper
    --cov-report=term-missing

# Markers for test categorization
markers =
    unit: Unit tests for individual functions
    integration: Integration tests for complete workflows
    slow: Tests that take significant time to run
    requires_api: Tests that require API keys

# Minimum Python version
minversion = 3.8

# Coverage settings
[coverage:run]
source = hybrid_citation_scraper
omit = 
    */tests/*
    */test_*.py
    */__pycache__/*
    */venv/*
    */.venv/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov
